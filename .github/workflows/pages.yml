name: Pages
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装项目依赖（包含hexo）
        run: npm install

      - name: 全局安装hexo-cli
        run: npm install -g hexo-cli

      - name: 生成静态网页
        run: hexo generate

      - name: 上传网页产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署Pages
        id: deployment
        uses: actions/deploy-pages@v4