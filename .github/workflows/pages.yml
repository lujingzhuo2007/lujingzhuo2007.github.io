name: Pages
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: 安装依赖
        run: npm install
      - name: Hexo生成静态网页
        run: npx hexo generate
      - name: 上传网页产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 部署Pages
        id: deployment
        uses: actions/deploy-pages@v4